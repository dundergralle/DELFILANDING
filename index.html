.bg::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(255,214,232,0.45) 0%,
    rgba(255,214,232,0.15) 50%,
    rgba(255,214,232,0.6) 100%);
}

/* TOP RAINBOW STRIPE */
.top-stripe {
  position: fixed; top: 0; left: 0; right: 0; height: 6px; z-index: 20;
  background: linear-gradient(90deg, #fef3a0, #fba8d0, #f472b6, #fba8d0, #fef3a0, #fba8d0, #f472b6);
  background-size: 300% 100%;
  animation: stripe-scroll 4s linear infinite;
}
@keyframes stripe-scroll { 0%{background-position:0%} 100%{background-position:300%} }

/* FLOATIES */
.floaties { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.floatie {
  position: absolute; bottom: -40px;
  animation: float-up linear infinite;
  opacity: 0;
}
@keyframes float-up {
  0%   { transform: translateY(0) rotate(-5deg); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
}

/* CONTENT */
.content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh;
  padding: max(2.5rem, env(safe-area-inset-top)) 1.5rem max(2.5rem, env(safe-area-inset-bottom));
}

/* AVATAR */
.av-wrap { position: relative; width: 115px; height: 115px; margin-bottom: 1rem; }
.av-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  background: conic-gradient(#fef3a0, #fba8d0, #f472b6, #fba8d0, #fef3a0);
  animation: spin 5s linear infinite;
  box-shadow: 0 0 18px rgba(244,114,182,0.5);
}
@keyframes spin { to { transform: rotate(360deg); } }
.av-inner {
  position: absolute; inset: 3px; border-radius: 50%;
  background: var(--cream); z-index: 1;
}
.av-placeholder {
  position: absolute; inset: 5px; z-index: 2;
  border-radius: 50%;
  background: linear-gradient(135deg, #fde8f3, #fba8d0);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
}
.badge {
  position: absolute; bottom: -6px; right: -6px; z-index: 3;
  font-size: 22px;
  animation: badge-bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 2px 4px rgba(244,114,182,0.4));
}
@keyframes badge-bounce {
  0%,100% { transform: rotate(-10deg) scale(1); }
  50%      { transform: rotate(12deg) scale(1.25); }
}

/* NAME */
h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 3rem;
  color: var(--hot);
  text-align: center;
  margin-bottom: 0.2rem;
  letter-spacing: 0.04em;
  text-shadow: 3px 3px 0 rgba(244,114,182,0.3), 0 0 20px rgba(244,114,182,0.2);
}

/* TAGLINE */
.tagline {
  font-size: 0.88rem; font-weight: 700;
  color: var(--text);
  text-align: center; margin-bottom: 1rem;
  letter-spacing: 0.02em;
  background: rgba(255,255,255,0.5);
  padding: 4px 16px; border-radius: 50px;
  border: 1.5px solid rgba(244,114,182,0.3);
}



/* BUTTONS - chunky rounded squares */
.btns {
  display: flex; flex-direction: column; gap: 0.65rem;
  width: 100%; max-width: 300px;
}

.btn {
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; min-height: 56px; padding: 0 1.5rem;
  border-radius: 18px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 3px solid rgba(244,114,182,0.5);
  color: var(--text);
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  letter-spacing: 0.04em;
  text-decoration: none; text-align: center;
  cursor: pointer; touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 5px 0 rgba(244,114,182,0.4), 0 8px 16px rgba(244,114,182,0.15);
}

.btn-primary {
  background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
  border-color: #db2777;
  color: #fff;
  text-shadow: 0 1px 3px rgba(180,40,100,0.3);
  box-shadow: 0 5px 0 #be185d, 0 8px 20px rgba(244,114,182,0.4);
  font-size: 1.05rem;
}

.btn-pink {
  background: rgba(255,255,255,0.85);
  border-color: rgba(244,114,182,0.6);
  box-shadow: 0 5px 0 rgba(244,114,182,0.35), 0 8px 16px rgba(244,114,182,0.1);
}

.btn:active {
  transform: translateY(4px) !important;
  box-shadow: 0 1px 0 rgba(244,114,182,0.4) !important;
}
@media (hover:hover) {
  .btn:hover { transform: translateY(-2px); }
}

/* shimmer */
.btn::after {
  content: ''; position: absolute;
  top:0; left:-100%; width:50%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  animation: shimmer 3s ease-in-out infinite;
}
@keyframes shimmer { 0%,60%{left:-100%;} 100%{left:140%;} }

/* FOOTER */
.footer {
  margin-top: 1.6rem;
  font-family: 'Fredoka One', cursive;
  font-size: 0.85rem;
  color: var(--pink);
  letter-spacing: 0.06em;
  text-shadow: 0 1px 0 rgba(255,255,255,0.8);
}

@media (max-width: 430px) {
  h1 { font-size: 2.4rem; }
  .av-wrap { width: 100px; height: 100px; }
  .btns { max-width: 100%; }
  .btn { min-height: 52px; border-radius: 14px; }
}
@media (max-height: 650px) {
  .av-wrap { width: 85px; height: 85px; margin-bottom: 0.6rem; }
  h1 { font-size: 2.1rem; }
  .loc { margin-bottom: 1rem; }
  .btns { gap: 0.45rem; }
  .btn { min-height: 48px; }
  .footer { margin-top: 1rem; }
}
</style>
</head>
<body>

<div class="top-stripe"></div>
<div class="bg"></div>
<div class="floaties" id="floaties"></div>

<div class="content">
  <div class="av-wrap">
    <div class="av-ring"></div>
    <div class="av-inner"></div>
    <div class="av-placeholder">🌈</div>
    <!-- Byt ut av-placeholder mot: <img class="av-img" src="DIN-BILD-URL-HÄR" alt="Delfi"> -->
    <span class="badge">🌸</span>
  </div>

  <h1>Delfi</h1>
  <p class="tagline">alltid på gott humör 🌸</p>

  <div class="btns">
    <a class="btn btn-primary" href="/link">
      💬 chatta med mig
    </a>
    <a class="btn btn-pink" href="INSTAGRAM-URL-HÄR" target="_blank">
      📸 instagram
    </a>
    <a class="btn btn-pink" href="X-URL-HÄR" target="_blank">
      🐦 x
    </a>
  </div>

  <p class="footer">🌈 delfi är här för dig 🌈</p>
</div>

<script>
(function(){
  var container = document.getElementById('floaties');
  var items = ['🌈','🌸','⭐','🌈','💕','🌈','✨','🎀','🌈','🌷','💫','🌈','🩷','🌸','🌈'];
  function spawn(){
    var el = document.createElement('span');
    el.className = 'floatie';
    el.textContent = items[Math.floor(Math.random() * items.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (14 + Math.random() * 18) + 'px';
    var dur = 6 + Math.random() * 8;
    var delay = Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = delay + 's';
    container.appendChild(el);
    setTimeout(function(){ el.remove(); }, (dur + delay) * 1000);
  }
  setInterval(spawn, 450);
})();

(function(){
  var f=['Tokyo','Seoul','Harajuku','Kyoto','Stockholm','Göteborg','Malmö','Helsingborg',
    'Copenhagen','Amsterdam','Paris','London','Bali','Singapore','Barcelona'];
  function setCity(c){ document.getElementById('loc-text').textContent = '5 min ago in: ' + (c && c.trim().length > 1 ? c.trim() : f[Math.floor(Math.random() * f.length)]); }
  function get(u,e){ return fetch(u,{cache:'no-store'}).then(r=>r.json()).then(d=>{var v=e(d);if(!v||v.trim().length<2)throw 0;return v;}); }
  get('https://ipinfo.io/json',d=>d&&d.city)
    .catch(()=>get('https://ip-api.com/json/?fields=city,regionName',d=>d&&(d.city||d.regionName)))
    .catch(()=>get('https://ipapi.co/json/',d=>d&&(d.city||d.region)))
    .then(setCity).catch(()=>setCity(null));
})();
</script>
</body>
</html>
